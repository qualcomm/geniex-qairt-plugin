name: Coverage

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  patch-coverage:
    name: Patch coverage (Windows ARM64)
    runs-on: windows-11-arm
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules)
        # All submodules are public, so the default GITHUB_TOKEN suffices —
        # no PAT secret required.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Need history back to the merge base so the diff gate can compute
          # the set of changed lines against the PR base branch.
          fetch-depth: 0

      - name: Install Rust toolchain
        # Required by third-party/tokenizers-cpp (compiles a Rust crate).
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/aarch64 -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable --profile minimal
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Show environment
        shell: pwsh
        run: |
          cmake --version
          python --version
          Write-Host "Runner OS:      $env:RUNNER_OS"
          Write-Host "Processor arch: $env:PROCESSOR_ARCHITECTURE"

      - name: Build instrumented unit tests + export coverage
        shell: pwsh
        run: |
          ./scripts/coverage.ps1 -BuildDir build-coverage

      - name: Enforce patch-coverage threshold
        shell: pwsh
        run: |
          $base = "origin/${{ github.base_ref }}"
          python scripts/diff_coverage.py `
            --export-json build-coverage/coverage/export.json `
            --base-ref $base `
            --threshold 85

      - name: Upload HTML coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-windows-arm64
          path: build-coverage/coverage/html
          if-no-files-found: ignore
          retention-days: 7
