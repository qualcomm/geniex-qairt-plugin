name: Build and Test

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-and-test-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  windows-arm64:
    name: Windows ARM64 build and test
    runs-on: windows-11-arm
    timeout-minutes: 60

    steps:
      - name: Checkout (with submodules)
        # All submodules are public, so the default GITHUB_TOKEN suffices —
        # no PAT secret required.
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Install Rust toolchain
        # Required by third_party/tokenizers-cpp (compiles a Rust crate).
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://win.rustup.rs/aarch64 -OutFile rustup-init.exe
          .\rustup-init.exe -y --default-toolchain stable --profile minimal
          "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show environment
        shell: pwsh
        run: |
          cmake --version
          rustc --version
          cargo --version
          Write-Host "Runner OS:      $env:RUNNER_OS"
          Write-Host "Processor arch: $env:PROCESSOR_ARCHITECTURE"

      - name: Select clang-cl toolchain
        # Build the whole tree with the VS-bundled clang-cl so the compiler is
        # uniform with the coverage job. CC/CXX are exported so the tokenizers
        # Rust crate's cc-rs helper uses clang-cl too -- otherwise it falls back
        # to cl.exe under a -T ClangCL configure and dies with a header C1012.
        shell: pwsh
        run: |
          $bin = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\*\*\VC\Tools\Llvm\ARM64\bin" -Directory | Select-Object -First 1
          $clangcl = Join-Path $bin.FullName "clang-cl.exe"
          "CC=$clangcl"  | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CXX=$clangcl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: |
          cmake -B build -A ARM64 -T ClangCL `
            -DCMAKE_BUILD_TYPE=Release `
            -DGENIEX_BUILD_EXAMPLES=ON `
            -DGENIEX_BUILD_VLM=ON `
            -DGENIEX_BUILD_TESTS=ON

      - name: Build
        shell: pwsh
        run: |
          cmake --build build --config Release -j

      - name: Test
        # CPU-only unit tests (label "unit"); no NPU required.
        shell: pwsh
        run: |
          ctest --test-dir build -C Release -L unit --output-on-failure `
            --output-junit build/test-results/unit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-results-windows-arm64
          path: build/test-results/unit.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-windows-arm64
          path: |
            build/**/*.log
            build/CMakeFiles/CMakeOutput.log
            build/CMakeFiles/CMakeError.log
          if-no-files-found: ignore
          retention-days: 7
